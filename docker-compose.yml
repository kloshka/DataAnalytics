services:
  postgres:
    image: postgres:16
    container_name: bdsnowflake-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bdsnowflake
      POSTGRES_USER: bds_user
      POSTGRES_PASSWORD: bds_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
      - ./исходные данные:/data/csv:ro

volumes:
  pg_data:
